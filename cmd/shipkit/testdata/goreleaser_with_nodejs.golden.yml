version: 2

before:
  hooks:
    - go mod tidy
    - npm ci
    - npm run build


builds:
  - id: nodejs-project
    main: ./cmd/nodejs
    binary: nodejs-binary
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=release
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}
      - -X main.buildVersion={{.Version}}

universal_binaries:
  - ids:
      - nodejs-project
    replace: true


archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

nfpms:
  - id: packages
    package_name: nodejs-project
    homepage: https://github.com/owner/repo
    maintainer: owner
    description: Node.js + Go application
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk

homebrew_casks:
  - repository:
      owner: owner
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/owner/repo
    description: Node.js + Go application
    license: Apache-2.0


release:
  replace_existing_artifacts: true

source: {}

checksum:
  name_template: 'checksums.txt'


changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs'
      - '^test'
      - '^chore'
      - Merge pull request
      - Merge branch


