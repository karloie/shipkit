version: 2

before:
  hooks:
    - go mod tidy


builds:
  - id: test-project
    main: ./cmd/test
    binary: test-binary
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=release
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}
      - -X main.buildVersion={{.Version}}

universal_binaries:
  - ids:
      - test-project
    replace: true


archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

nfpms:
  - id: packages
    package_name: test-project
    homepage: https://github.com/test-owner/test-repo
    maintainer: test-owner
    description: Test application
    license: MIT
    formats:
      - deb
      - rpm
      - apk

homebrew_casks:
  - repository:
      owner: test-owner
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/test-owner/test-repo
    description: Test application
    license: MIT


release:
  replace_existing_artifacts: true

source: {}

checksum:
  name_template: 'checksums.txt'


changelog:
  disable: true


