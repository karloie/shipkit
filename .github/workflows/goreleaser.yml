name: Reusable GoReleaser

on:
  workflow_call:
    inputs:
      event_name:
        description: Original caller event name
        required: true
        type: string
      tag:
        description: Tag input for manual dispatch, e.g. v1.2.3
        required: false
        type: string
      publish:
        description: Whether to publish the release
        required: false
        default: false
        type: boolean
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      go_version:
        description: Go version for running tool
        required: false
        default: "1.25"
        type: string
      node_version:
        description: Node version for projects that need frontend build metadata
        required: false
        default: "22"
        type: string
      setup_node:
        description: Set to false for repositories that do not need Node.js in release jobs
        required: false
        default: "true"
        type: string
      project_name:
        description: Project name for goreleaser config generation (defaults to repo name)
        required: false
        default: ""
        type: string
      binary_name:
        description: Binary name for goreleaser config generation (defaults to project name)
        required: false
        default: ""
        type: string
      project_description:
        description: Project description for goreleaser config
        required: false
        default: "Application built with Go"
        type: string
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Setup Node.js
        if: ${{ inputs.setup_node == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Setup Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Compute policy
        id: plan
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }} policy
          -mode=goreleaser
          -event-name=${{ inputs.event_name }}
          -publish=${{ inputs.publish }}
          -next-tag=${{ inputs.event_name == 'push' && github.ref_name || inputs.tag }}
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate GoReleaser config
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }} goreleaser
          -project=${{ inputs.project_name != '' && inputs.project_name || github.event.repository.name }}
          -binary=${{ inputs.binary_name }}
          -owner=${{ github.repository_owner }}
          -repo=${{ github.event.repository.name }}
          -description="${{ inputs.project_description }}"
          -output=.goreleaser.yml

      - name: Run GoReleaser dry-run
        if: ${{ steps.plan.outputs.publish_mode != 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Run GoReleaser publish
        if: ${{ steps.plan.outputs.publish_mode == 'true' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Summary
        run: printf '%s\n' "${{ steps.plan.outputs.summary_message }}"
