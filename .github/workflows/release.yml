name: Reusable Release (Make/Just)

on:
  workflow_call:
    inputs:
      mode:
        description: Release mode (release, rerelease, docker, or goreleaser)
        required: false
        default: release
        type: string
      event_name:
        description: Original caller event name (push or workflow_dispatch, only for release mode)
        required: false
        type: string
      bump:
        description: Manual bump input (patch, minor, major, only for release mode)
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      image:
        description: Docker image name override (leave empty to use {owner}/{project})
        required: false
        default: ""
        type: string
      dry_run:
        description: Dry run mode (plan only, skip actual release)
        required: false
        default: false
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
      NPM_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # Plan: Build shipkit tool and run plan
  plan:
    name: 📋 plan
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.plan.outputs.docker_image }}
      next_tag: ${{ steps.plan.outputs.next_tag }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      publish_skip: ${{ steps.plan.outputs.publish_skip }}
      tag: ${{ steps.plan.outputs.next_tag || steps.plan.outputs.release_tag }}
      tag_exists: ${{ steps.plan.outputs.tag_exists }}
      tag_latest: ${{ steps.plan.outputs.tag_latest }}
      version_clean: ${{ steps.plan.outputs.version_clean }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Plan release
        id: plan
        run: |
          shipkit plan \
            -mode=${{ inputs.mode }} \
            -bump=${{ inputs.bump }} \
            -sha=${{ github.sha }} \
            -dry-run=${{ inputs.dry_run }} \
            -image=${{ inputs.image }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Upload plan data
        uses: actions/upload-artifact@v4
        with:
          name: plan-data
          path: plan.json
          retention-days: 1

  # Build: Run ci-build (project Makefile or justfile controls what gets built)
  build:
    name: 🏗️ build
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Generate (optional)
        run: |
          if [ -f justfile ]; then
            if just --list 2>/dev/null | grep -q ci-generate; then
              just ci-generate
            else
              echo "⏭️  No ci-generate recipe found, skipping"
            fi
          elif [ -f Makefile ]; then
            if make -n ci-generate >/dev/null 2>&1; then
              make ci-generate
            else
              echo "⏭️  No ci-generate target found, skipping"
            fi
          else
            echo "⏭️  No build orchestrator found, skipping"
          fi
        env:
          # Pass all secrets so Makefile can use them
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build (required)
        run: |
          if [ -f justfile ]; then
            just ci-build
          elif [ -f Makefile ]; then
            make ci-build
          else
            echo "❌ No build orchestrator found (Makefile or justfile)"
            exit 1
          fi
        env:
          # Pass all secrets so Makefile can use them
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Test (optional)
        run: |
          if [ -f justfile ]; then
            if just --list 2>/dev/null | grep -q ci-test; then
              just ci-test
            else
              echo "⏭️  No ci-test recipe found, skipping"
            fi
          elif [ -f Makefile ]; then
            if make -n ci-test >/dev/null 2>&1; then
              make ci-test
            else
              echo "⏭️  No ci-test target found, skipping"
            fi
          else
            echo "⏭️  No build orchestrator found, skipping"
          fi
        env:
          # Pass all secrets so Makefile can use them
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Integration Test (optional)
        run: |
          if [ -f justfile ]; then
            if just --list 2>/dev/null | grep -q ci-integration-test; then
              just ci-integration-test
            else
              echo "⏭️  No ci-integration-test recipe found, skipping"
            fi
          elif [ -f Makefile ]; then
            if make -n ci-integration-test >/dev/null 2>&1; then
              make ci-integration-test
            else
              echo "⏭️  No ci-integration-test target found, skipping"
            fi
          else
            echo "⏭️  No build orchestrator found, skipping"
          fi
        env:
          # Pass all secrets so Makefile can use them
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Tag: Create git tag (only if build passes)
  tag:
    name: 🏷️ tag
    runs-on: ubuntu-latest
    needs: [plan, build]
    if: |
      always() &&
      needs.plan.outputs.publish_skip != 'true' &&
      needs.plan.outputs.tag_exists != 'true' &&
      inputs.mode == 'release' &&
      inputs.dry_run != true &&
      needs.build.result == 'success'
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Configure Git
        run: shipkit git-config

      - name: Create and push tag
        run: shipkit git-tag -tag="${{ needs.plan.outputs.tag }}"

  # Decide: Evaluate publish decision
  decide:
    name: 🤔 decide
    runs-on: ubuntu-latest
    needs: [plan, build, tag]
    if: always()
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
    steps:
      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Decide publish actions
        id: decide
        run: |
          shipkit decide \
            -mode=${{ inputs.mode }} \
            -dry-run=${{ inputs.dry_run }} \
            -result-build=${{ needs.build.result }} \
            -result-tag=${{ needs.tag.result }}

  # Publish: Run ci-publish via shipkit (project Makefile/justfile can override)
  publish:
    name: 🚀 publish
    runs-on: ubuntu-latest
    needs: [plan, build, tag, decide]
    if: needs.decide.outputs.should_publish == 'true'
    steps:
      - name: Checkout project at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Run publish
        run: shipkit publish
        env:
          # Pass all secrets so Makefile can use them
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Summary: Generate release summary
  summary:
    name: 📊 summary
    runs-on: ubuntu-latest
    if: always()
    needs: [plan, build, tag, decide, publish]
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Generate release summary
        run: |
          shipkit summary \
            -plan-file=plan.json \
            -tool-ref="${{ inputs.tool_ref }}" \
            -result-plan="${{ needs.plan.result }}" \
            -result-build="${{ needs.build.result }}" \
            -result-tag="${{ needs.tag.result }}" \
            -result-publish="${{ needs.publish.result }}"

      - name: Run custom summary (if exists)
        run: |
          if [ -f justfile ]; then
            if just --list 2>/dev/null | grep -q ci-summary; then
              echo "Running just ci-summary..."
              just ci-summary
            else
              echo "No ci-summary recipe found, skipping"
            fi
          elif [ -f Makefile ]; then
            if make -n ci-summary >/dev/null 2>&1; then
              echo "Running make ci-summary..."
              make ci-summary
            else
              echo "No ci-summary target found, skipping"
            fi
          else
            echo "No build orchestrator found, skipping"
          fi
