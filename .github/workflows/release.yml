name: Reusable * (Make/Just)

on:
  workflow_call:
    inputs:
      mode:
        description: Release mode (release, rerelease, docker, or goreleaser)
        required: false
        default: release
        type: string
      event_name:
        description: Original caller event name (push or workflow_dispatch, only for release mode)
        required: false
        type: string
      bump:
        description: Manual bump input (patch, minor, major, only for release mode)
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      image:
        description: Docker image name override (leave empty to use {owner}/{project})
        required: false
        default: ""
        type: string
      dry_run:
        description: Dry run mode (plan only, skip actual release)
        required: false
        default: false
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
      NPM_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # Plan: Build shipkit tool and run plan
  plan:
    name: 📋 plan
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.plan.outputs.docker_image }}
      tag_next: ${{ steps.plan.outputs.tag_next }}
      tag_release: ${{ steps.plan.outputs.tag_release }}
      release_skip: ${{ steps.plan.outputs.release_skip }}
      tag: ${{ steps.plan.outputs.tag_next || steps.plan.outputs.tag_release }}
      tag_exists: ${{ steps.plan.outputs.tag_exists }}
      tag_latest: ${{ steps.plan.outputs.tag_latest }}
      version_clean: ${{ steps.plan.outputs.version_clean }}
      has_ci_generate: ${{ steps.plan.outputs.has_ci_generate }}
      has_ci_build: ${{ steps.plan.outputs.has_ci_build }}
      has_ci_test: ${{ steps.plan.outputs.has_ci_test }}
      has_ci_integration_test: ${{ steps.plan.outputs.has_ci_integration_test }}
      has_ci_release: ${{ steps.plan.outputs.has_ci_release }}
      has_ci_summary: ${{ steps.plan.outputs.has_ci_summary }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Plan release
        id: plan
        run: |
          shipkit plan \
            -mode=${{ inputs.mode }} \
            -bump=${{ inputs.bump }} \
            -sha=${{ github.sha }} \
            -dry-run=${{ inputs.dry_run }} \
            -image=${{ inputs.image }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Upload plan data
        uses: actions/upload-artifact@v4
        with:
          name: plan-data
          path: plan.json
          retention-days: 1

  # Generate: Run ci-generate (optional, code generation step)
  generate:
    name: 📦 generate
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_ci_generate == 'true'
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Run ci-generate
        run: |
          if [ -f justfile ]; then
            just ci-generate
          elif [ -f Makefile ]; then
            make ci-generate
          fi
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build: Run ci-build (required, project Makefile or justfile controls what gets built)
  build:
    name: 🏗️ build
    runs-on: ubuntu-latest
    needs: [plan, generate]
    if: |
      always() &&
      needs.plan.outputs.has_ci_build == 'true' &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Run ci-build
        run: |
          if [ -f justfile ]; then
            just ci-build
          elif [ -f Makefile ]; then
            make ci-build
          fi
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Test: Run ci-test (optional, unit/integration tests)
  test:
    name: 🧪 test
    runs-on: ubuntu-latest
    needs: [plan, build]
    if: |
      always() &&
      needs.plan.outputs.has_ci_test == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Run ci-test
        run: |
          if [ -f justfile ]; then
            just ci-test
          elif [ -f Makefile ]; then
            make ci-test
          fi
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Integration Test: Run ci-integration-test (optional, heavier test suite)
  integration-test:
    name: 🔬 int-test
    runs-on: ubuntu-latest
    needs: [plan, test]
    if: |
      always() &&
      needs.plan.outputs.has_ci_integration_test == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Run ci-integration-test
        run: |
          if [ -f justfile ]; then
            just ci-integration-test
          elif [ -f Makefile ]; then
            make ci-integration-test
          fi
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Decide: Evaluate release decision (before creating tag)
  decide:
    name: ✅ decide
    runs-on: ubuntu-latest
    needs: [plan, build, test, integration-test]
    if: always()
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Decide release actions
        id: decide
        run: |
          shipkit decide \
            -mode=${{ inputs.mode }} \
            -dry-run=${{ inputs.dry_run }} \
            -result-build=${{ needs.build.result }}

  # Tag: Create git tag (only if decide says we should release)
  tag:
    name: 🏷️ tag
    runs-on: ubuntu-latest
    needs: [plan, decide]
    if: |
      needs.decide.outputs.should_release == 'true' &&
      needs.plan.outputs.release_skip != 'true' &&
      needs.plan.outputs.tag_exists != 'true' &&
      inputs.mode == 'release' &&
      inputs.dry_run != true
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Configure Git
        run: shipkit git-config

      - name: Create and push tag
        run: shipkit git-tag -tag="${{ needs.plan.outputs.tag }}"

  # Release: Run ci-release via shipkit (project Makefile/justfile controls release)
  release:
    name: 🚀 release
    runs-on: ubuntu-latest
    needs: [plan, decide, tag]
    if: |
      needs.decide.outputs.should_release == 'true' &&
      needs.plan.outputs.has_ci_release == 'true'
    steps:
      - name: Checkout project at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Run release
        run: shipkit release
        env:
          # Pass all secrets so Makefile can use them
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Summary: Generate release summary
  summary:
    name: 📊 summary
    runs-on: ubuntu-latest
    if: always()
    needs: [plan, build, test, integration-test, decide, tag, release]
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Generate release summary
        run: |
          shipkit summary \
            -plan-file=plan.json \
            -tool-ref="${{ inputs.tool_ref }}" \
            -result-plan="${{ needs.plan.result }}" \
            -result-build="${{ needs.build.result }}" \
            -result-tag="${{ needs.tag.result }}" \
            -result-release="${{ needs.release.result }}"

      - name: Run custom summary (if exists)
        if: needs.plan.outputs.has_ci_summary == 'true'
        run: |
          if [ -f justfile ]; then
            just ci-summary
          elif [ -f Makefile ]; then
            make ci-summary
          fi
