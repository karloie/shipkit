name: Reusable Release

on:
  workflow_call:
    inputs:
      mode:
        description: Release mode (release, rerelease, docker, or goreleaser)
        required: false
        default: release
        type: string
      event_name:
        description: Original caller event name (push or workflow_dispatch, only for release mode)
        required: false
        type: string
      bump:
        description: Manual bump input (patch, minor, major, only for release mode)
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      go_version:
        description: Go version for running tool (leave empty to auto-detect from go.mod)
        required: false
        default: ""
        type: string
      node_version:
        description: Node version for frontend build in go-publish job (leave empty to skip)
        required: false
        default: ""
        type: string
      go_main:
        description: Main package path override (leave empty to use ./cmd/{project})
        required: false
        default: ""
        type: string
      dry_run:
        description: Dry run mode (plan only, skip actual release)
        required: false
        default: false
        type: boolean
      use_docker:
        description: Run docker job (uses Dockerfile if exists)
        required: false
        default: true
        type: boolean
      use_go:
        description: Run go job (uses go.mod if exists)
        required: false
        default: true
        type: boolean
      use_goreleaser:
        description: Run go-publish job (uses .goreleaser.yml if exists, otherwise auto-generates)
        required: false
        default: true
        type: boolean
      use_maven:
        description: Run maven job (uses pom.xml if exists)
        required: false
        default: true
        type: boolean
      java_version:
        description: Java version for Maven build (leave empty to use default)
        required: false
        default: ""
        type: string
      maven_args:
        description: Additional Maven arguments
        required: false
        default: ""
        type: string
      use_npm:
        description: Run npm job (uses package.json if exists)
        required: false
        default: true
        type: boolean
      npm_args:
        description: Additional npm arguments
        required: false
        default: ""
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
      NPM_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # Plan: Build shipkit tool and run plan
  plan:
    name: 📋 plan
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.plan.outputs.docker_image }}
      goreleaser_docker: ${{ steps.plan.outputs.goreleaser_docker }}
      goreleaser_config_current: ${{ steps.plan.outputs.goreleaser_config_current }}
      goreleaser_config_auto: ${{ steps.plan.outputs.goreleaser_config_auto }}
      has_docker: ${{ steps.plan.outputs.has_docker }}
      has_go: ${{ steps.plan.outputs.has_go }}
      has_maven: ${{ steps.plan.outputs.has_maven }}
      has_npm: ${{ steps.plan.outputs.has_npm }}
      next_tag: ${{ steps.plan.outputs.next_tag }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      skip: ${{ steps.plan.outputs.skip }}
      tag: ${{ steps.plan.outputs.next_tag || steps.plan.outputs.release_tag }}
      tag_exists: ${{ steps.plan.outputs.tag_exists }}
      tag_latest: ${{ steps.plan.outputs.tag_latest }}
      version_clean: ${{ steps.plan.outputs.version_clean }}

    steps:
      - name: Checkout shipkit at tool_ref
        uses: actions/checkout@v4
        with:
          repository: karloie/shipkit
          ref: ${{ inputs.tool_ref }}
          path: shipkit-tool

      - uses: actions/setup-go@v5
        with:
          go-version-file: shipkit-tool/go.mod
          cache: false

      - name: Build shipkit binary
        run: |
          cd shipkit-tool
          go build -o shipkit ./cmd/shipkit
          chmod +x shipkit
          ./shipkit --version || echo "Version command not available"
          mv shipkit /tmp/shipkit

      - name: Upload shipkit binary
        uses: actions/upload-artifact@v4
        with:
          name: shipkit-binary
          path: /tmp/shipkit
          retention-days: 1

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy shipkit binary to project
        run: cp /tmp/shipkit ./shipkit

      - name: Plan release
        id: plan
        run: ./shipkit plan -mode=${{ inputs.mode }} -bump=${{ inputs.bump }} -sha=${{ github.sha }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  # Build group: test and build current code (runs in parallel, no version changes)
  npm-build:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.skip != 'true' && needs.plan.outputs.has_npm == 'true' && inputs.use_npm == true
    uses: ./.github/workflows/npm-build.yml
    with:
      node_version: ${{ inputs.node_version || '18' }}
      npm_args: ${{ inputs.npm_args }}

  go-build:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.skip != 'true' && needs.plan.outputs.has_go == 'true' && inputs.use_go == true
    uses: ./.github/workflows/go-build.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      go_version: ${{ inputs.go_version }}

  maven-build:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.skip != 'true' && needs.plan.outputs.has_maven == 'true' && inputs.use_maven == true
    uses: ./.github/workflows/maven-build.yml
    with:
      java_version: ${{ inputs.java_version || '17' }}
      maven_args: ${{ inputs.maven_args }}

  docker-build:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.skip != 'true' && needs.plan.outputs.goreleaser_docker != 'true' && needs.plan.outputs.has_docker == 'true' && inputs.use_docker == true
    uses: ./.github/workflows/docker-build.yml
    with:
      image: ${{ needs.plan.outputs.docker_image }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      go_version: ${{ inputs.go_version }}

  # Tag and update version files (only if ALL builds pass)
  tag:
    name: 🏷️ tag
    needs: [plan, npm-build, go-build, maven-build, docker-build]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      needs.plan.outputs.tag_exists != 'true' &&
      inputs.mode == 'release' &&
      inputs.dry_run != true &&
      (needs.npm-build.result == 'success' || needs.npm-build.result == 'skipped') &&
      (needs.go-build.result == 'success' || needs.go-build.result == 'skipped') &&
      (needs.maven-build.result == 'success' || needs.maven-build.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    uses: ./.github/workflows/git-tag.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}

  git-update-versions:
    name: "  📝 update"
    needs: [plan, npm-build, go-build, maven-build, docker-build, tag]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      inputs.dry_run != true &&
      needs.tag.result == 'success' &&
      (needs.npm-build.result == 'success' || needs.npm-build.result == 'skipped') &&
      (needs.go-build.result == 'success' || needs.go-build.result == 'skipped') &&
      (needs.maven-build.result == 'success' || needs.maven-build.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    uses: ./.github/workflows/git-version-files.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      version: ${{ needs.plan.outputs.version_clean }}
      has_npm: ${{ needs.plan.outputs.has_npm }}
      has_maven: ${{ needs.plan.outputs.has_maven }}

  # Publish group: publishes artifacts (runs in parallel after setup)
  npm-publish:
    name: 🚀 publish
    needs: [plan, npm-build, go-build, maven-build, docker-build, tag, update-versions]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      needs.plan.outputs.has_npm == 'true' &&
      inputs.use_npm == true &&
      inputs.dry_run != true &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped') &&
      (needs.update-versions.result == 'success' || needs.update-versions.result == 'skipped') &&
      (needs.npm-build.result == 'success' || needs.npm-build.result == 'skipped') &&
      (needs.go-build.result == 'success' || needs.go-build.result == 'skipped') &&
      (needs.maven-build.result == 'success' || needs.maven-build.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    uses: ./.github/workflows/npm-publish.yml
    with:
      tag: ${{ needs.plan.outputs.tag }}
      node_version: ${{ inputs.node_version || '18' }}
      npm_args: ${{ inputs.npm_args }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  maven-publish:
    name: 🚀 publish
    needs: [plan, npm-build, go-build, maven-build, docker-build, tag, update-versions]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      needs.plan.outputs.has_maven == 'true' &&
      inputs.use_maven == true &&
      inputs.dry_run != true &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped') &&
      (needs.update-versions.result == 'success' || needs.update-versions.result == 'skipped') &&
      (needs.npm-build.result == 'success' || needs.npm-build.result == 'skipped') &&
      (needs.go-build.result == 'success' || needs.go-build.result == 'skipped') &&
      (needs.maven-build.result == 'success' || needs.maven-build.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    uses: ./.github/workflows/maven-publish.yml
    with:
      tag: ${{ needs.plan.outputs.tag }}
      java_version: ${{ inputs.java_version || '17' }}
      maven_args: ${{ inputs.maven_args }}
    secrets:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  docker-publish:
    name: 🚀 publish
    needs: [plan, npm-build, go-build, maven-build, docker-build, tag, update-versions]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      needs.plan.outputs.goreleaser_docker != 'true' &&
      needs.plan.outputs.has_docker == 'true' &&
      inputs.mode != 'goreleaser' &&
      inputs.use_docker == true &&
      inputs.dry_run != true &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped') &&
      (needs.update-versions.result == 'success' || needs.update-versions.result == 'skipped') &&
      (needs.npm-build.result == 'success' || needs.npm-build.result == 'skipped') &&
      (needs.go-build.result == 'success' || needs.go-build.result == 'skipped') &&
      (needs.maven-build.result == 'success' || needs.maven-build.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    uses: ./.github/workflows/docker-publish.yml
    with:
      event_name: push
      go_version: ${{ inputs.go_version }}
      image: ${{ needs.plan.outputs.docker_image }}
      tag_latest: ${{ needs.plan.outputs.tag_latest == 'true' }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  go-publish:
    name: 🚀 publish
    needs: [plan, npm-build, go-build, maven-build, docker-build, tag, update-versions]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      inputs.use_goreleaser == true &&
      inputs.dry_run != true &&
      (needs.tag.result == 'success' || needs.tag.result == 'skipped') &&
      (needs.update-versions.result == 'success' || needs.update-versions.result == 'skipped') &&
      (needs.npm-build.result == 'success' || needs.npm-build.result == 'skipped') &&
      (needs.go-build.result == 'success' || needs.go-build.result == 'skipped') &&
      (needs.maven-build.result == 'success' || needs.maven-build.result == 'skipped') &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped')
    uses: ./.github/workflows/go-publish.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      go_version: ${{ inputs.go_version }}
      node_version: ${{ inputs.node_version }}
      go_main: ${{ inputs.go_main }}
      goreleaser_config_current: ${{ needs.plan.outputs.goreleaser_config_current }}
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  summary:
    name: 📊 summary
    runs-on: ubuntu-latest
    if: always()
    needs: [plan, npm-build, go-build, maven-build, docker-build, tag, update-versions, npm-publish, maven-publish, docker-publish, go-publish]
    steps:
      - name: Generate release summary
        run: |
          echo "# 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Plan section
          echo "## 📋 Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`${{ inputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tool Ref | \`${{ inputs.tool_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip | ${{ needs.plan.outputs.skip || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ needs.plan.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag Exists | ${{ needs.plan.outputs.tag_exists || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.plan.outputs.version_clean }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | \`${{ needs.plan.outputs.docker_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Detection section
          echo "## 🔍 Detected Projects" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Project Type | Detected | GoReleaser Handles |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|----------|-------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go | ${{ needs.plan.outputs.has_go == 'true' && '✅' || '❌' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.plan.outputs.has_docker == 'true' && '✅' || '❌' }} | ${{ needs.plan.outputs.goreleaser_docker == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Maven | ${{ needs.plan.outputs.has_maven == 'true' && '✅' || '❌' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| npm | ${{ needs.plan.outputs.has_npm == 'true' && '✅' || '❌' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Execution section
          echo "## ⚙️ Execution Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| � Plan | ${{ needs.plan.result == 'success' && '✅ Success' || needs.plan.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ npm Build | ${{ needs.npm-build.result == 'success' && '✅ Success' || needs.npm-build.result == 'skipped' && '⏭️ Skipped' || needs.npm-build.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Go Build | ${{ needs.go-build.result == 'success' && '✅ Success' || needs.go-build.result == 'skipped' && '⏭️ Skipped' || needs.go-build.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Maven Build | ${{ needs.maven-build.result == 'success' && '✅ Success' || needs.maven-build.result == 'skipped' && '⏭️ Skipped' || needs.maven-build.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Docker Build | ${{ needs.docker-build.result == 'success' && '✅ Success' || needs.docker-build.result == 'skipped' && '⏭️ Skipped' || needs.docker-build.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Tag | ${{ needs.tag.result == 'success' && '✅ Success' || needs.tag.result == 'skipped' && '⏭️ Skipped' || needs.tag.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Update Versions | ${{ needs.update-versions.result == 'success' && '✅ Success' || needs.update-versions.result == 'skipped' && '⏭️ Skipped' || needs.update-versions.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 npm Publish | ${{ needs.npm-publish.result == 'success' && '✅ Success' || needs.npm-publish.result == 'skipped' && '⏭️ Skipped' || needs.npm-publish.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Maven Publish | ${{ needs.maven-publish.result == 'success' && '✅ Success' || needs.maven-publish.result == 'skipped' && '⏭️ Skipped' || needs.maven-publish.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Docker Publish | ${{ needs.docker-publish.result == 'success' && '✅ Success' || needs.docker-publish.result == 'skipped' && '⏭️ Skipped' || needs.docker-publish.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Go Publish | ${{ needs.go-publish.result == 'success' && '✅ Success' || needs.go-publish.result == 'skipped' && '⏭️ Skipped' || needs.go-publish.result == 'failure' && '❌ Failed' || '⚪ N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.plan.outputs.skip }}" == "true" ]; then
            echo "## ℹ️ Overall Status: **SKIPPED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No release markers found. Release was skipped." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.go-publish.result }}" == "success" ] || [ "${{ needs.docker-publish.result }}" == "success" ] || [ "${{ needs.npm-publish.result }}" == "success" ] || [ "${{ needs.maven-publish.result }}" == "success" ]; then
            echo "## ✅ Overall Status: **SUCCESS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Release \`${{ needs.plan.outputs.tag }}\` completed successfully!" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.plan.result }}" == "failure" ]; then
            echo "## ❌ Overall Status: **FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Release failed during planning phase." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.tag.result }}" == "failure" ]; then
            echo "## ❌ Overall Status: **FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Release failed during tag creation." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Overall Status: **PARTIAL**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some jobs succeeded, but publish phase may have been skipped or failed." >> $GITHUB_STEP_SUMMARY
          fi
