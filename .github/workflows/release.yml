name: Reusable Release

on:
  workflow_call:
    inputs:
      mode:
        description: Release mode (release, rerelease, docker, or goreleaser)
        required: false
        default: release
        type: string
      event_name:
        description: Original caller event name (push or workflow_dispatch, only for release mode)
        required: false
        type: string
      bump:
        description: Manual bump input (patch, minor, major, only for release mode)
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      go_version:
        description: Go version for running tool (leave empty to auto-detect from go.mod)
        required: false
        default: ""
        type: string
      node_version:
        description: Node version for frontend build in publish-go job (leave empty to skip)
        required: false
        default: ""
        type: string
      go_main:
        description: Main package path override (leave empty to use ./cmd/{project})
        required: false
        default: ""
        type: string
      image:
        description: Docker image name override (leave empty to use {owner}/{project})
        required: false
        default: ""
        type: string
      dry_run:
        description: Dry run mode (plan only, skip actual release)
        required: false
        default: false
        type: boolean
      use_docker:
        description: Run docker job (uses Dockerfile if exists)
        required: false
        default: true
        type: boolean
      use_go:
        description: Run go job (uses go.mod if exists)
        required: false
        default: true
        type: boolean
      use_goreleaser:
        description: Run publish-go job (uses .goreleaser.yml if exists, otherwise auto-generates)
        required: false
        default: true
        type: boolean
      use_maven:
        description: Run maven job (uses pom.xml if exists)
        required: false
        default: true
        type: boolean
      java_version:
        description: Java version for Maven build (leave empty to use default)
        required: false
        default: ""
        type: string
      maven_args:
        description: Additional Maven arguments
        required: false
        default: ""
        type: string
      use_npm:
        description: Run npm job (uses package.json if exists)
        required: false
        default: true
        type: boolean
      npm_args:
        description: Additional npm arguments
        required: false
        default: ""
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
      NPM_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # Plan: Build shipkit tool and run plan
  plan:
    name: 📋 plan
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.plan.outputs.docker_image }}
      should_build_docker_goreleaser: ${{ steps.plan.outputs.should_build_docker_goreleaser }}
      goreleaser_config_current: ${{ steps.plan.outputs.goreleaser_config_current }}
      goreleaser_config_auto: ${{ steps.plan.outputs.goreleaser_config_auto }}
      has_docker: ${{ steps.plan.outputs.has_docker }}
      has_go: ${{ steps.plan.outputs.has_go }}
      has_maven: ${{ steps.plan.outputs.has_maven }}
      has_npm: ${{ steps.plan.outputs.has_npm }}
      next_tag: ${{ steps.plan.outputs.next_tag }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      skip: ${{ steps.plan.outputs.skip }}
      tag: ${{ steps.plan.outputs.next_tag || steps.plan.outputs.release_tag }}
      tag_exists: ${{ steps.plan.outputs.tag_exists }}
      tag_latest: ${{ steps.plan.outputs.tag_latest }}
      version_clean: ${{ steps.plan.outputs.version_clean }}
      should_build_npm: ${{ steps.plan.outputs.should_build_npm }}
      should_build_go: ${{ steps.plan.outputs.should_build_go }}
      should_build_maven: ${{ steps.plan.outputs.should_build_maven }}
      should_build_docker: ${{ steps.plan.outputs.should_build_docker }}

    steps:
      - name: Checkout shipkit at tool_ref
        uses: actions/checkout@v4
        with:
          repository: karloie/shipkit
          ref: ${{ inputs.tool_ref }}
          path: shipkit-tool

      - uses: actions/setup-go@v5
        with:
          go-version-file: shipkit-tool/go.mod
          cache: false

      - name: Build shipkit binary
        run: |
          cd shipkit-tool
          go build -o shipkit ./cmd/shipkit
          chmod +x shipkit
          ./shipkit --version || echo "Version command not available"
          mv shipkit /tmp/shipkit

      - name: Upload shipkit binary
        uses: actions/upload-artifact@v4
        with:
          name: shipkit-binary
          path: /tmp/shipkit
          retention-days: 1

      - name: Upload plan data
        uses: actions/upload-artifact@v4
        with:
          name: plan-data
          path: /tmp/plan.json
          retention-days: 1

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy shipkit binary to project
        run: cp /tmp/shipkit ./shipkit

      - name: Plan release
        id: plan
        run: |
          ./shipkit plan \
            -mode=${{ inputs.mode }} \
            -bump=${{ inputs.bump }} \
            -sha=${{ github.sha }} \
            -dry-run=${{ inputs.dry_run }} \
            -use-npm=${{ inputs.use_npm }} \
            -use-maven=${{ inputs.use_maven }} \
            -use-docker=${{ inputs.use_docker }} \
            -use-go=${{ inputs.use_go }} \
            -use-goreleaser=${{ inputs.use_goreleaser }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  # Build group: test and build current code (runs in parallel, no version changes)
  build-npm:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.should_build_npm == 'true'
    uses: ./.github/workflows/build-npm.yml
    with:
      node_version: ${{ inputs.node_version || '18' }}
      npm_args: ${{ inputs.npm_args }}

  build-go:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.should_build_go == 'true'
    uses: ./.github/workflows/build-go.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      go_version: ${{ inputs.go_version }}

  build-maven:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.should_build_maven == 'true'
    uses: ./.github/workflows/build-maven.yml
    with:
      java_version: ${{ inputs.java_version || '17' }}
      maven_args: ${{ inputs.maven_args }}

  build-docker:
    name: 🏗️ build
    needs: plan
    if: needs.plan.outputs.should_build_docker == 'true'
    uses: ./.github/workflows/build-docker.yml
    with:
      image: ${{ inputs.image || needs.plan.outputs.docker_image }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      go_version: ${{ inputs.go_version }}

  # Tag and update version files (only if ALL builds pass)
  tag:
    name: 🏷️ tag
    needs: [plan, build-npm, build-go, build-maven, build-docker]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      needs.plan.outputs.tag_exists != 'true' &&
      inputs.mode == 'release' &&
      inputs.dry_run != true &&
      (needs.build-npm.result == 'success' || needs.build-npm.result == 'skipped') &&
      (needs.build-go.result == 'success' || needs.build-go.result == 'skipped') &&
      (needs.build-maven.result == 'success' || needs.build-maven.result == 'skipped') &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped')
    uses: ./.github/workflows/git-tag.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}

  update-versions:
    name: "  📝 update"
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag]
    if: |
      always() &&
      needs.plan.outputs.skip != 'true' &&
      inputs.dry_run != true &&
      needs.tag.result == 'success' &&
      (needs.build-npm.result == 'success' || needs.build-npm.result == 'skipped') &&
      (needs.build-go.result == 'success' || needs.build-go.result == 'skipped') &&
      (needs.build-maven.result == 'success' || needs.build-maven.result == 'skipped') &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped')
    uses: ./.github/workflows/git-version-files.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      version: ${{ needs.plan.outputs.version_clean }}
      has_npm: ${{ needs.plan.outputs.has_npm }}
      has_maven: ${{ needs.plan.outputs.has_maven }}

  # Decide: Evaluate publish decisions (testable Go code)
  decide:
    name: 🤔 decide
    runs-on: ubuntu-latest
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag, update-versions]
    if: always()
    outputs:
      should_publish_npm: ${{ steps.decide.outputs.should_publish_npm }}
      should_publish_maven: ${{ steps.decide.outputs.should_publish_maven }}
      should_publish_docker: ${{ steps.decide.outputs.should_publish_docker }}
      should_publish_go: ${{ steps.decide.outputs.should_publish_go }}
    steps:
      - name: Download shipkit binary
        uses: actions/download-artifact@v4
        with:
          name: shipkit-binary
          path: .

      - name: Make binary executable
        run: chmod +x shipkit

      - name: Decide publish actions
        id: decide
        run: |
          ./shipkit decide \
            -mode=${{ inputs.mode }} \
            -dry-run=${{ inputs.dry_run }} \
            -use-goreleaser=${{ inputs.use_goreleaser }} \
            -should-build-docker-goreleaser=${{ needs.plan.outputs.should_build_docker_goreleaser }} \
            -should-build-npm=${{ needs.plan.outputs.should_build_npm }} \
            -should-build-go=${{ needs.plan.outputs.should_build_go }} \
            -should-build-maven=${{ needs.plan.outputs.should_build_maven }} \
            -should-build-docker=${{ needs.plan.outputs.should_build_docker }} \
            -build-result-npm=${{ needs.build-npm.result }} \
            -build-result-go=${{ needs.build-go.result }} \
            -build-result-maven=${{ needs.build-maven.result }} \
            -build-result-docker=${{ needs.build-docker.result }} \
            -result-tag=${{ needs.tag.result }} \
            -result-update-versions=${{ needs.update-versions.result }}

  # Publish group: publishes artifacts (runs in parallel after setup)
  publish-npm:
    name: 🚀 publish
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag, update-versions, decide]
    if: needs.decide.outputs.should_publish_npm == 'true'
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: ${{ needs.plan.outputs.tag }}
      node_version: ${{ inputs.node_version || '18' }}
      npm_args: ${{ inputs.npm_args }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-maven:
    name: 🚀 publish
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag, update-versions, decide]
    if: needs.decide.outputs.should_publish_maven == 'true'
    uses: ./.github/workflows/publish-maven.yml
    with:
      tag: ${{ needs.plan.outputs.tag }}
      java_version: ${{ inputs.java_version || '17' }}
      maven_args: ${{ inputs.maven_args }}
    secrets:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  publish-docker:
    name: 🚀 publish
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag, update-versions, decide]
    if: needs.decide.outputs.should_publish_docker == 'true'
    uses: ./.github/workflows/publish-docker.yml
    with:
      event_name: push
      go_version: ${{ inputs.go_version }}
      image: ${{ inputs.image || needs.plan.outputs.docker_image }}
      tag_latest: ${{ needs.plan.outputs.tag_latest == 'true' }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  publish-go:
    name: 🚀 publish
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag, update-versions, decide]
    if: needs.decide.outputs.should_publish_go == 'true'
    uses: ./.github/workflows/publish-go.yml
    with:
      mode: ${{ inputs.mode }}
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      node_version: ${{ inputs.node_version }}
      go_main: ${{ inputs.go_main }}
      go_version: ${{ inputs.go_version }}
      goreleaser_config_current: ${{ needs.plan.outputs.goreleaser_config_current }}
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  summary:
    name: 📊 summary
    runs-on: ubuntu-latest
    if: always()
    needs: [plan, build-npm, build-go, build-maven, build-docker, tag, update-versions, decide, publish-npm, publish-maven, publish-docker, publish-go]
    steps:
      - name: Download shipkit binary
        uses: actions/download-artifact@v4
        with:
          name: shipkit-binary
          path: .

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: .

      - name: Make binary executable
        run: chmod +x shipkit

      - name: Generate release summary
        run: |
          ./shipkit summary \
            -plan-file=plan.json \
            -tool-ref="${{ inputs.tool_ref }}" \
            -result-plan="${{ needs.plan.result }}" \
            -result-tag="${{ needs.tag.result }}" \
            -result-build-npm="${{ needs.build-npm.result }}" \
            -result-build-go="${{ needs.build-go.result }}" \
            -result-build-maven="${{ needs.build-maven.result }}" \
            -result-build-docker="${{ needs.build-docker.result }}" \
            -result-update-versions="${{ needs.update-versions.result }}" \
            -result-publish-npm="${{ needs.publish-npm.result }}" \
            -result-publish-maven="${{ needs.publish-maven.result }}" \
            -result-publish-docker="${{ needs.publish-docker.result }}" \
            -result-publish-go="${{ needs.publish-go.result }}"
