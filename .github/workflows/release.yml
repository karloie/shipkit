name: Reusable Release

on:
  workflow_call:
    inputs:
      image:
        description: Docker image repository name
        required: true
        type: string
      mode:
        description: Release mode (release or rerelease)
        required: false
        default: release
        type: string
      event_name:
        description: Original caller event name (push or workflow_dispatch, only for release mode)
        required: false
        type: string
      bump:
        description: Manual bump input (patch, minor, major, only for release mode)
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      go_version:
        description: Go version for running tool (leave empty to auto-detect from go.mod)
        required: false
        default: ""
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      dryrun: ${{ steps.plan.outputs.dryrun }}
      next_tag: ${{ steps.plan.outputs.next_tag }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      tag: ${{ steps.plan.outputs.next_tag || steps.plan.outputs.release_tag }}
      goreleaser_docker: ${{ steps.plan.outputs.goreleaser_docker }}
      goreleaser_yml_current: ${{ steps.plan.outputs.goreleaser_yml_current }}
      goreleaser_yml_new: ${{ steps.plan.outputs.goreleaser_yml_new }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ inputs.go_version == '' && 'go.mod' || '' }}
          cache: true

      - name: Plan release
        id: plan
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }} plan
          -mode=${{ inputs.mode }}
          ${{ inputs.mode == 'release' && format('-bump={0}', inputs.bump) || '' }}
          ${{ inputs.mode == 'rerelease' && '-resolve-latest-tag=true' || '' }}
          -image=${{ inputs.image }}
          -sha=${{ github.sha }}
          -owner=${{ github.repository_owner }}
          -repo=${{ github.event.repository.name }}
          -run-id=${{ github.run_id }}
        env:
          GITHUB_EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  goreleaser:
    needs: plan
    if: ${{ needs.plan.outputs.dryrun != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ inputs.go_version == '' && 'go.mod' || '' }}
          cache: true

      - name: Generate GoReleaser config
        if: ${{ needs.plan.outputs.goreleaser_yml_current != 'true' }}
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }} plan
          -mode=rerelease
          -next-tag=${{ needs.plan.outputs.tag }}
          -image=${{ inputs.image }}
          -owner=${{ github.repository_owner }}
          -repo=${{ github.event.repository.name }}
          -run-id=${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean ${{ needs.plan.outputs.goreleaser_yml_current != 'true' && format('--config={0}', needs.plan.outputs.goreleaser_yml_new) || '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Cleanup on failure
        if: ${{ failure() && needs.plan.outputs.tag != '' && inputs.mode == 'release' }}
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }} git-tag-cleanup
          -tag=${{ needs.plan.outputs.tag }}

  docker:
    needs: plan
    if: ${{ needs.plan.outputs.dryrun != 'true' && needs.plan.outputs.goreleaser_docker != 'true' }}
    uses: ./.github/workflows/docker.yml
    with:
      image: ${{ inputs.image }}
      event_name: push
      tag: ${{ needs.plan.outputs.tag }}
      tool_ref: ${{ inputs.tool_ref }}
      go_version: ${{ inputs.go_version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
