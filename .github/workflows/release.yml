name: Reusable * (Make/Just)

on:
  workflow_call:
    inputs:
      mode:
        description: Release mode (release, rerelease, docker, or goreleaser)
        required: false
        default: release
        type: string
      event_name:
        description: Original caller event name (push or workflow_dispatch, only for release mode)
        required: false
        type: string
      bump:
        description: Manual bump input (patch, minor, major, only for release mode)
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      image:
        description: Docker image name override (leave empty to use {owner}/{project})
        required: false
        default: ""
        type: string
      dry_run:
        description: Dry run mode (plan only, skip actual release)
        required: false
        default: false
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: false
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false
      NPM_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # Plan: Build shipkit tool and run plan
  plan:
    name: 📋 plan
    runs-on: ubuntu-latest
    outputs:
      container_image: ${{ steps.plan.outputs.container_image }}
      tag_next: ${{ steps.plan.outputs.tag_next }}
      tag_release: ${{ steps.plan.outputs.tag_release }}
      release_skip: ${{ steps.plan.outputs.release_skip }}
      tag: ${{ steps.plan.outputs.tag_next || steps.plan.outputs.tag_release }}
      tag_exists: ${{ steps.plan.outputs.tag_exists }}
      tag_latest: ${{ steps.plan.outputs.tag_latest }}
      version_clean: ${{ steps.plan.outputs.version_clean }}
      has_ci_generate: ${{ steps.plan.outputs.has_ci_generate }}
      has_ci_build: ${{ steps.plan.outputs.has_ci_build }}
      has_ci_test: ${{ steps.plan.outputs.has_ci_test }}
      has_ci_integration_test: ${{ steps.plan.outputs.has_ci_integration_test }}
      has_ci_release: ${{ steps.plan.outputs.has_ci_release }}
      has_ci_summary: ${{ steps.plan.outputs.has_ci_summary }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Plan release
        id: plan
        run: |
          shipkit plan \
            -mode=${{ inputs.mode }} \
            -bump=${{ inputs.bump }} \
            -sha=${{ github.sha }} \
            -dry-run=${{ inputs.dry_run }} \
            -image=${{ inputs.image }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_EVENT_NAME: ${{ inputs.event_name }}
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Upload plan data
        uses: actions/upload-artifact@v4
        with:
          name: plan-data
          path: /tmp/shipkit/plan.json
          retention-days: 1

  # Verify: Run generate/build/test/int-test and decide within one job
  verify:
    name: 🧪 verify
    runs-on: ubuntu-latest
    needs: plan
    if: always()
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      build_result: ${{ steps.results.outputs.build_result }}
      test_result: ${{ steps.results.outputs.test_result }}
      integration_test_result: ${{ steps.results.outputs.integration_test_result }}
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      GITHUB_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: /tmp/shipkit

      - name: Run ci-generate
        id: generate
        if: needs.plan.outputs.has_ci_generate == 'true'
        continue-on-error: true
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-generate:' Makefile; then
            make ci-generate
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-generate:' justfile; then
            just ci-generate
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-generate:' Taskfile.yml; then
            task ci-generate
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-generate:' Taskfile.yaml; then
            task ci-generate
          else
            echo "⏭️  No ci-generate hook found, skipping"
          fi

      - name: Run ci-build
        id: build
        if: |
          needs.plan.outputs.has_ci_build == 'true' &&
          (steps.generate.conclusion == 'success' || steps.generate.conclusion == 'skipped')
        continue-on-error: true
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-build:' Makefile; then
            make ci-build
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-build:' justfile; then
            just ci-build
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-build:' Taskfile.yml; then
            task ci-build
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-build:' Taskfile.yaml; then
            task ci-build
          else
            echo "⏭️  No ci-build hook found, skipping"
          fi

      - name: Run ci-test
        id: test
        if: |
          needs.plan.outputs.has_ci_test == 'true' &&
          (steps.build.conclusion == 'success' || steps.build.conclusion == 'skipped')
        continue-on-error: true
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-test:' Makefile; then
            make ci-test
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-test:' justfile; then
            just ci-test
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-test:' Taskfile.yml; then
            task ci-test
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-test:' Taskfile.yaml; then
            task ci-test
          else
            echo "⏭️  No ci-test hook found, skipping"
          fi

      - name: Run ci-integration-test
        id: integration_test
        if: |
          needs.plan.outputs.has_ci_integration_test == 'true' &&
          (steps.test.conclusion == 'success' || steps.test.conclusion == 'skipped')
        continue-on-error: true
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-integration-test:' Makefile; then
            make ci-integration-test
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-integration-test:' justfile; then
            just ci-integration-test
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-integration-test:' Taskfile.yml; then
            task ci-integration-test
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-integration-test:' Taskfile.yaml; then
            task ci-integration-test
          else
            echo "⏭️  No ci-integration-test hook found, skipping"
          fi

      - name: Record verify results
        id: results
        if: always()
        env:
          BUILD_RESULT: ${{ steps.build.conclusion }}
          TEST_RESULT: ${{ steps.test.conclusion }}
          INTEGRATION_TEST_RESULT: ${{ steps.integration_test.conclusion }}
        run: |
          echo "build_result=${BUILD_RESULT:-skipped}" >> "$GITHUB_OUTPUT"
          echo "test_result=${TEST_RESULT:-skipped}" >> "$GITHUB_OUTPUT"
          echo "integration_test_result=${INTEGRATION_TEST_RESULT:-skipped}" >> "$GITHUB_OUTPUT"

      - name: Decide release actions
        id: decide
        if: always()
        run: |
          shipkit decide \
            -mode=${{ inputs.mode }} \
            -dry-run=${{ inputs.dry_run }} \
            -result-build=${{ steps.results.outputs.build_result }} \
            -result-test=${{ steps.results.outputs.test_result }} \
            -result-integration-test=${{ steps.results.outputs.integration_test_result }}

      - name: Finalize verify job
        if: always()
        env:
          GENERATE_RESULT: ${{ steps.generate.conclusion }}
          BUILD_RESULT: ${{ steps.results.outputs.build_result }}
          TEST_RESULT: ${{ steps.results.outputs.test_result }}
          INTEGRATION_TEST_RESULT: ${{ steps.results.outputs.integration_test_result }}
        run: |
          failed=0
          for result in "${GENERATE_RESULT:-skipped}" "${BUILD_RESULT:-skipped}" "${TEST_RESULT:-skipped}" "${INTEGRATION_TEST_RESULT:-skipped}"; do
            if [ "$result" = "failure" ]; then
              failed=1
            fi
          done
          exit "$failed"

  # Publish: Create tag and run release within one job
  publish:
    name: 🚀 publish
    runs-on: ubuntu-latest
    needs: [plan, verify]
    if: |
      always() &&
      needs.verify.outputs.should_release == 'true' &&
      (
        (
          needs.plan.outputs.release_skip != 'true' &&
          needs.plan.outputs.tag_exists != 'true' &&
          inputs.mode == 'release' &&
          inputs.dry_run != true
        ) ||
        needs.plan.outputs.has_ci_release == 'true'
      )
    outputs:
      tag_result: ${{ steps.publish_results.outputs.tag_result }}
      release_result: ${{ steps.publish_results.outputs.release_result }}
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      GITHUB_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Set up QEMU
        if: needs.plan.outputs.has_ci_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: needs.plan.outputs.has_ci_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Configure Git
        if: |
          needs.plan.outputs.release_skip != 'true' &&
          needs.plan.outputs.tag_exists != 'true' &&
          inputs.mode == 'release' &&
          inputs.dry_run != true
        run: shipkit git-config

      - name: Create and push tag
        id: tag
        if: |
          needs.plan.outputs.release_skip != 'true' &&
          needs.plan.outputs.tag_exists != 'true' &&
          inputs.mode == 'release' &&
          inputs.dry_run != true
        run: shipkit git-tag -tag="${{ needs.plan.outputs.tag }}"

      - name: Checkout project at tag
        if: needs.plan.outputs.has_ci_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go (for go install tools)
        if: needs.plan.outputs.has_ci_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download plan data
        if: needs.plan.outputs.has_ci_release == 'true'
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: /tmp/shipkit

      - name: Run release
        id: release
        if: needs.plan.outputs.has_ci_release == 'true'
        run: shipkit release

      - name: Record publish results
        id: publish_results
        if: always()
        env:
          TAG_RESULT: ${{ steps.tag.conclusion }}
          RELEASE_RESULT: ${{ steps.release.conclusion }}
        run: |
          echo "tag_result=${TAG_RESULT:-skipped}" >> "$GITHUB_OUTPUT"
          echo "release_result=${RELEASE_RESULT:-skipped}" >> "$GITHUB_OUTPUT"

  # Summary: Generate release summary
  summary:
    name: 📊 summary
    runs-on: ubuntu-latest
    if: always()
    needs: [plan, verify, publish]
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - uses: karloie/shipkit/.github/actions/setup-shipkit@main
        with:
          tool_ref: ${{ inputs.tool_ref }}

      - name: Download plan data
        uses: actions/download-artifact@v4
        with:
          name: plan-data
          path: /tmp/shipkit

      - name: Generate release summary
        env:
          RESULT_BUILD: ${{ needs.verify.outputs.build_result }}
          RESULT_TAG: ${{ needs.publish.outputs.tag_result }}
          RESULT_RELEASE: ${{ needs.publish.outputs.release_result }}
        run: |
          shipkit summary \
            -plan-file=/tmp/shipkit/plan.json \
            -tool-ref="${{ inputs.tool_ref }}" \
            -result-plan="${{ needs.plan.result }}" \
            -result-build="${RESULT_BUILD:-skipped}" \
            -result-tag="${RESULT_TAG:-skipped}" \
            -result-release="${RESULT_RELEASE:-skipped}"

      - name: Run custom summary (if exists)
        if: needs.plan.outputs.has_ci_summary == 'true'
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-summary:' Makefile; then
            make ci-summary
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-summary:' justfile; then
            just ci-summary
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-summary:' Taskfile.yml; then
            task ci-summary
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-summary:' Taskfile.yaml; then
            task ci-summary
          else
            echo "⏭️  No ci-summary hook found, skipping"
          fi
