name: Reusable Maven Publish

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to checkout (e.g. v1.2.3)
        required: true
        type: string
      java_version:
        description: "Java version for Maven build (default: 17)"
        required: false
        default: "17"
        type: string
      java_distribution:
        description: "Java distribution (default: temurin)"
        required: false
        default: "temurin"
        type: string
      maven_args:
        description: Additional Maven arguments
        required: false
        default: ""
        type: string
    secrets:
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      MAVEN_GPG_PRIVATE_KEY:
        required: false
      MAVEN_GPG_PASSPHRASE:
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: maven-publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          # Skip if credentials not provided
          if [ -z "$MAVEN_USERNAME" ] || [ -z "$MAVEN_PASSWORD" ]; then
            echo "Maven credentials not provided, skipping deploy"
            exit 0
          fi
          
          # Import GPG key if provided
          if [ -n "$MAVEN_GPG_PRIVATE_KEY" ]; then
            echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import
          fi
          
          # Deploy to Maven Central
          MAVEN_ARGS="${{ inputs.maven_args }}"
          # shellcheck disable=SC2086
          mvn -B deploy -DskipTests -Prelease $MAVEN_ARGS
