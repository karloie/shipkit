name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      mode:
        description: CI mode to run (validation or build-test)
        required: false
        default: ""
        type: string
      make_targets:
        description: Make targets to run for validation
        required: false
        default: ci-validate
        type: string
      go_version:
        description: Explicit Go version override (for example 1.25)
        required: false
        default: ""
        type: string
      node_version:
        description: Explicit Node version override (for example 22)
        required: false
        default: ""
        type: string
      node_cache:
        description: setup-node cache mode
        required: false
        default: npm
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate
        if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request' || inputs.mode == 'validation') && inputs.mode != 'build-test' }}
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/nektos/act/master/install.sh | bash -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          make ${{ inputs.make_targets || 'ci-validate' }}

      - uses: actions/setup-node@v4
        if: ${{ inputs.mode == 'build-test' && inputs.node_version != '' }}
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.node_cache }}

      - name: Install optional task runners
        if: ${{ inputs.mode == 'build-test' }}
        run: |
          mkdir -p "$HOME/.local/bin"
          if [ -f justfile ]; then
            wget -qO- https://github.com/casey/just/releases/download/1.36.0/just-1.36.0-x86_64-unknown-linux-musl.tar.gz | tar xvz -C "$HOME/.local/bin" just
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            just --version
          fi
          if [ -f Taskfile.yml ] || [ -f Taskfile.yaml ]; then
            sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            task --version
          fi

      - name: Install frontend dependencies
        if: ${{ inputs.mode == 'build-test' && inputs.node_version != '' }}
        run: npm ci

      - name: Build frontend
        if: ${{ inputs.mode == 'build-test' && inputs.node_version != '' }}
        run: npm run build

      - name: Download Go dependencies
        if: ${{ inputs.mode == 'build-test' && inputs.go_version != '' }}
        run: go mod download

      - name: Generate
        if: ${{ inputs.mode == 'build-test' }}
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-generate:' Makefile; then
            make ci-generate
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-generate:' justfile; then
            just ci-generate
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-generate:' Taskfile.yml; then
            task ci-generate
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-generate:' Taskfile.yaml; then
            task ci-generate
          else
            echo "⏭️  No ci-generate hook found, skipping"
          fi

      - name: Build
        if: ${{ inputs.mode == 'build-test' }}
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-build:' Makefile; then
            make ci-build
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-build:' justfile; then
            just ci-build
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-build:' Taskfile.yml; then
            task ci-build
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-build:' Taskfile.yaml; then
            task ci-build
          else
            echo "⏭️  No ci-build hook found, skipping"
          fi

      - name: Test
        if: ${{ inputs.mode == 'build-test' }}
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-test:' Makefile; then
            make ci-test
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-test:' justfile; then
            just ci-test
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-test:' Taskfile.yml; then
            task ci-test
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-test:' Taskfile.yaml; then
            task ci-test
          else
            echo "⏭️  No ci-test hook found, skipping"
          fi

      - name: Integration Test
        if: ${{ inputs.mode == 'build-test' }}
        run: |
          if [ -f Makefile ] && grep -Eq '^ci-integration-test:' Makefile; then
            make ci-integration-test
          elif [ -f justfile ] && grep -Eq '^[[:space:]]*@?ci-integration-test:' justfile; then
            just ci-integration-test
          elif [ -f Taskfile.yml ] && grep -Eq '^[[:space:]]+ci-integration-test:' Taskfile.yml; then
            task ci-integration-test
          elif [ -f Taskfile.yaml ] && grep -Eq '^[[:space:]]+ci-integration-test:' Taskfile.yaml; then
            task ci-integration-test
          else
            echo "⏭️  No ci-integration-test hook found, skipping"
          fi
