name: Release Shipkit

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode (run as normal but just log actual commands instead of executing them)"
        required: false
        default: false
        type: boolean
      tool_ref_override:
        description: "Shipkit ref"
        required: false
        default: ""
        type: string
      tool_ref:
        description: "Shipkit version"
        required: false
        default: v0.0.19
        type: choice
        options:
          - main
          - v0.0.19
      bump:
        description: "Version bump (patch, minor, major)"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      mode:
        description: "Release mode"
        required: false
        default: release
        type: choice
        options:
          - release
          - rerelease
          - docker
          - goreleaser
      go_version:
        description: "Go version (empty to auto-detect)"
        required: false
        default: ""
        type: string
      go_main:
        description: "Go main package path (empty to use ./cmd/{project})"
        required: false
        default: ""
        type: string
      java_version:
        description: "Java version for maven build (empty to auto-detect)"
        required: false
        default: ""
        type: string
      node_version:
        description: "Node version for npm build (empty to auto-detect)"
        required: false
        default: ""
        type: string
      use_docker:
        description: "Run docker job"
        required: false
        default: true
        type: boolean
      use_go:
        description: "Run go job"
        required: false
        default: true
        type: boolean
      use_goreleaser:
        description: "Run go-publish job"
        required: false
        default: true
        type: boolean
      use_maven:
        description: "Run maven job"
        required: false
        default: true
        type: boolean
      use_npm:
        description: "Run npm job"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  _:
    name: " "
    concurrency:
      group: release-shipkit-main
      cancel-in-progress: false
    # Note: @ref must be static - GitHub Actions doesn't allow inputs context here
    # The tool_ref input controls which Go code version is used, not the workflow file version
    # Using @main for workflow files since they're stable
    uses: karloie/shipkit/.github/workflows/release.yml@main
    with:
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}
      event_name: ${{ github.event_name }}
      go_version: ${{ inputs.go_version }}
      java_version: ${{ inputs.java_version }}
      go_main: ${{ inputs.go_main }}
      mode: ${{ inputs.mode || 'release' }}
      node_version: ${{ inputs.node_version }}
      tool_ref: ${{ inputs.tool_ref_override != '' && inputs.tool_ref_override || inputs.tool_ref || 'v0.0.12' }}
      use_docker: ${{ inputs.use_docker }}
      use_go: ${{ inputs.use_go }}
      use_goreleaser: ${{ inputs.use_goreleaser }}
      use_maven: ${{ inputs.use_maven }}
      use_npm: ${{ inputs.use_npm }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: karloie
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
