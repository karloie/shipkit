name: Release Shipkit

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch, minor, major)"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run mode (plan only, skip actual release)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: make ci-generate

      - name: Build
        run: make ci-build

      - name: Test
        run: make ci-test

      - name: Integration Test
        run: make ci-integration-test

  tag:
    name: 🏷️ Tag
    needs: build
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build shipkit
        run: |
          mkdir -p ~/.local/bin
          go build -o /tmp/shipkit ./cmd/shipkit
          mv /tmp/shipkit ~/.local/bin/shipkit
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          shipkit --version || echo "Shipkit installed to ~/.local/bin"

      - name: Compute version
        id: version
        run: |
          # Get current version from git tags
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Current version: $CURRENT_VERSION"
          
          # Compute next version based on bump (default to patch on push to main)
          BUMP="${{ inputs.bump || 'patch' }}"
          echo "Version bump: $BUMP"
          VERSION_NO_V="${CURRENT_VERSION#v}"
          IFS='.' read -ra PARTS <<< "$VERSION_NO_V"
          MAJOR="${PARTS[0]}"
          MINOR="${PARTS[1]}"
          PATCH="${PARTS[2]}"
          
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          
          echo "New version: $NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  release:
    name: 🚀 Release
    needs: [build, tag]
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}" ]; then
            MISSING="$MISSING HOMEBREW_TAP_GITHUB_TOKEN"
          fi
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            echo "Configure these in Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [tag, release]
    if: |
      always() &&
      needs.tag.result == 'success' &&
      needs.release.result == 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete failed release tag
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          echo "Deleting tag $TAG due to release failure"
          git push --delete origin "$TAG" || echo "Tag already deleted or doesn't exist"

  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build, tag, release, cleanup]
    steps:
      - name: Generate summary
        run: |
          {
            echo "# 🚀 Shipkit Release"
            echo ""
            echo "## Results"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| 🔨 Build | ${{ needs.build.result }} |"
            echo "| 🏷️ Tag | ${{ needs.tag.result }} |"
            echo "| 🚀 Release | ${{ needs.release.result }} |"
            if [ "${{ needs.cleanup.result }}" != "skipped" ]; then
              echo "| 🧹 Cleanup | ${{ needs.cleanup.result }} |"
            fi
            echo ""
            if [ "${{ needs.tag.outputs.tag }}" != "" ]; then
              if [ "${{ needs.release.result }}" == "success" ]; then
                echo "**Released:** ${{ needs.tag.outputs.tag }}"
              elif [ "${{ needs.cleanup.result }}" == "success" ]; then
                echo "**Tag ${{ needs.tag.outputs.tag }} cleaned up after release failure**"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
