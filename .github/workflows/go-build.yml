name: Reusable Go Build

on:
  workflow_call:
    inputs:
      mode:
        description: Release mode (release, rerelease, etc.)
        required: true
        type: string
      tag:
        description: Release tag (e.g. v1.2.3)
        required: true
        type: string
      tool_ref:
        description: Shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      go_version:
        description: Go version (leave empty to auto-detect from go.mod)
        required: false
        default: ""
        type: string
      test_args:
        description: Additional test arguments
        required: false
        default: ""
        type: string
      build_args:
        description: Additional build arguments
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  go:
    name: 🐹 go
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download shipkit binary
        uses: actions/download-artifact@v4
        with:
          name: shipkit-binary
          path: .

      - name: Make binary executable
        run: chmod +x shipkit

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ inputs.go_version == '' && 'go.mod' || '' }}
          cache: true

      - name: Configure Git
        run: ./shipkit git-config

      - name: Run tests
        run: |
          TEST_ARGS="${{ inputs.test_args }}"
          # shellcheck disable=SC2086
          go test ./... -v -cover $TEST_ARGS

      - name: Build
        run: |
          BUILD_ARGS="${{ inputs.build_args }}"
          # shellcheck disable=SC2086
          go build ./... $BUILD_ARGS
