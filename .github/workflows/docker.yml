name: Reusable Docker Publish

on:
  workflow_call:
    inputs:
      image:
        description: Docker image repository name
        required: true
        type: string
      event_name:
        description: Original caller event name
        required: true
        type: string
      tag:
        description: Tag input for manual dispatch, e.g. v1.2.3
        required: false
        type: string
      tool_ref:
        description: shipkit ref for go run module@ref
        required: false
        default: main
        type: string
      go_version:
        description: Go version for running tool
        required: false
        default: "1.25"
        type: string
      build_version:
        description: Version string to inject into Docker build (passed as --build-arg BUILD_VERSION)
        required: false
        default: dev
        type: string
      build_commit:
        description: Commit SHA to inject into Docker build (passed as --build-arg BUILD_COMMIT)
        required: false
        default: none
        type: string
      build_date:
        description: Build date to inject into Docker build (passed as --build-arg BUILD_DATE)
        required: false
        default: unknown
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Compute docker policy
        id: plan
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }} policy
          -mode=docker
          -event-name=${{ inputs.event_name }}
          -next-tag=${{ inputs.event_name == 'push' && github.ref_name || inputs.tag }}
          -image=${{ inputs.image }}
          -sha=${{ github.sha }}

      - name: Set up Docker Buildx
        if: ${{ steps.plan.outputs.should_publish == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ steps.plan.outputs.should_publish == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: ${{ steps.plan.outputs.should_publish == 'true' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=${{ steps.plan.outputs.docker_version }}
            type=raw,value=${{ steps.plan.outputs.docker_major_minor }}
            type=sha,prefix=sha-

      - name: Build and push
        if: ${{ steps.plan.outputs.should_publish == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ steps.plan.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ inputs.build_commit }}
            BUILD_DATE=${{ inputs.build_date }}
            BUILD_VERSION=${{ inputs.build_version }}

      - name: Summary
        run: |
          echo "${{ steps.plan.outputs.summary_message }}"
          echo "Image tags:"
          echo "  - ${{ inputs.image }}:${{ steps.plan.outputs.docker_version }}"
          echo "  - ${{ inputs.image }}:${{ steps.plan.outputs.docker_major_minor }}"
          echo "  - ${{ inputs.image }}:sha-${GITHUB_SHA::7}"
