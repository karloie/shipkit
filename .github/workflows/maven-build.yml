name: Reusable Maven Build

on:
  workflow_call:
    inputs:
      java_version:
        description: "Java version for Maven build (default: 17)"
        required: false
        default: "17"
        type: string
      java_distribution:
        description: "Java distribution (default: temurin)"
        required: false
        default: "temurin"
        type: string
      maven_args:
        description: Additional Maven arguments
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    name: ☕ maven
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      - name: Build with Maven
        run: |
          MAVEN_ARGS="${{ inputs.maven_args }}"
          # shellcheck disable=SC2086
          mvn -B clean verify $MAVEN_ARGS
