name: 'Setup Shipkit'
description: 'Install shipkit CLI tool'
inputs:
  tool_ref:
    description: 'Shipkit version/ref to install'
    required: false
    default: 'main'
  go_version:
    description: 'Go version to use'
    required: false
    default: '1.21'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}
        cache: false
    
    - name: Install shipkit
      shell: bash
      run: go install github.com/karloie/shipkit/cmd/shipkit@${{ inputs.tool_ref }}
    
    - name: Install just (if justfile exists)
      shell: bash
      run: |
        if [ -f justfile ]; then
          echo "📦 Found justfile, installing just..."
          wget -qO- https://github.com/casey/just/releases/download/1.36.0/just-1.36.0-x86_64-unknown-linux-musl.tar.gz | tar xvz -C ~/.local/bin just
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          just --version
        else
          echo "⏭️  No justfile found, skipping just installation"
        fi
